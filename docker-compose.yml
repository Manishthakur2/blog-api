services:
  flask:
    image: blog-api:v1
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - admin
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - admin
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - flask
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  admin:
  frontend:
  backend:
